"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$time\n  \
[уұһӘ](fg:iris) \
"""

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[в–‘в–’в–“](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay) "
#format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
documents = "у°Ҳҷ"
downloads = "пҖҷ "
music = "пҖҒ "
pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)([$all_status$ahead_behind]($style))[оӮҙ](fg:overlay) '
up_to_date = '[ вң“ ](bg:overlay fg:iris)'
untracked = '[?\($count\)](bg:overlay fg:gold)'
stashed = '[\$](bg:overlay fg:iris)'
modified = '[!\($count\)](bg:overlay fg:gold)'
renamed = '[В»\($count\)](bg:overlay fg:iris)'
deleted = '[вңҳ\($count\)](style)'
staged = '[++\($count\)](bg:overlay fg:gold)'
ahead = '[вҮЎ\(${count}\)](bg:overlay fg:foam)'
diverged = 'вҮ•[\[](bg:overlay fg:iris)[вҮЎ\(${ahead_count}\)](bg:overlay fg:foam)[вҮЈ\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = '[вҮЈ\(${count}\)](bg:overlay fg:rose)'

[time]
disabled = false
format = " [оӮ¶](fg:overlay)[ $time пҗә ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ о°• ]($style)[оӮҙ](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

# Languages

[golang]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оҳ§ "

[java]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оү– "

[nodejs]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "у°Һҷ "

[rust]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оһЁ "

[python]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = 'оңј '

